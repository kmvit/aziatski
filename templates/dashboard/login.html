{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Панель управления</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Open+Sans:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: {
            colors: { forest: { 50:'#f0f7f0',100:'#dceede',500:'#2D5F2D',600:'#234a23',700:'#1a371a' }, cream:'#FAFAF8' },
            fontFamily: { display:['Montserrat','sans-serif'], body:['Open Sans','sans-serif'] }
        }}}
    </script>
</head>
<body class="font-body bg-cream min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <div class="w-14 h-14 rounded-full bg-forest-500 flex items-center justify-center mx-auto mb-4">
                <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h1 class="font-display text-2xl font-bold text-forest-700">Панель управления</h1>
            <p class="text-stone-400 text-sm mt-1">Азиатский</p>
        </div>

        {% if error %}
        <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm text-center">{{ error }}</div>
        {% endif %}

        <form method="post" class="bg-white rounded-2xl shadow-lg p-8 border border-stone-100">
            {% csrf_token %}
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-stone-500 mb-1.5">Логин</label>
                    <input type="text" name="username" required autofocus
                           class="w-full px-4 py-3 rounded-xl border border-stone-200 focus:border-forest-400 focus:ring-2 focus:ring-forest-400/20 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-stone-500 mb-1.5">Пароль</label>
                    <input type="password" name="password" required
                           class="w-full px-4 py-3 rounded-xl border border-stone-200 focus:border-forest-400 focus:ring-2 focus:ring-forest-400/20 outline-none transition-all">
                </div>
            </div>
            <button type="submit" class="w-full mt-6 px-6 py-3.5 bg-forest-500 text-white font-semibold rounded-xl hover:bg-forest-600 transition-all">
                Войти
            </button>
        </form>

        <div class="text-center mt-6">
            <a href="{% url 'index' %}" class="text-sm text-stone-400 hover:text-forest-500 transition-colors">← На сайт</a>
        </div>
    </div>
</body>
</html>
